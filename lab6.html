<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 6</title>
  <style>
    :root{
      --bg:#0b1220;
      --bg2:#111a2e;
      --card:#ffffff;
      --text:#e9eefb;
      --muted:#9aa8c7;
      --primary:#3b82f6;
      --primary2:#2563eb;
      --border:#cfe0ff;
      --ok:#16a34a;
      --bad:#dc2626;
      --skip:#f59e0b;
      --shadow: 0 14px 40px rgba(0,0,0,.22);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.25), transparent 24%),
        radial-gradient(circle at top right, rgba(37,99,235,.18), transparent 22%),
        linear-gradient(180deg, var(--bg), #08101d 70%, #060b14);
      color:var(--text);
      min-height:100vh;
    }
    .topbar{
      position:fixed;
      top:0; left:0; right:0;
      z-index:1000;
      background: rgba(7, 13, 24, .78);
      backdrop-filter: blur(12px);
      border-bottom:1px solid rgba(207,224,255,.16);
      box-shadow: 0 8px 30px rgba(0,0,0,.18);
    }
    .topbar-inner{
      max-width:1100px;
      margin:0 auto;
      padding:14px 16px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:14px;
      align-items:center;
    }
    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:12px;
      padding:10px 14px;
      font-weight:700;
      transition:.2s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      white-space:nowrap;
    }
    .btn-back{
      background:linear-gradient(180deg, #1d4ed8, #1e40af);
      color:#fff;
      box-shadow: 0 8px 18px rgba(37,99,235,.28);
    }
    .btn-back:hover{transform:translateY(-1px); filter:brightness(1.05)}
    .top-info{
      display:grid;
      gap:8px;
    }
    .stats-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px 16px;
      align-items:center;
      justify-content:space-between;
      font-size:14px;
      color:var(--text);
    }
    .stat{
      display:flex;
      gap:8px;
      align-items:center;
      font-weight:600;
    }
    .progress-wrap{
      height:12px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(207,224,255,.18);
    }
    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #60a5fa, #2563eb);
      border-radius:999px;
      transition:width .25s ease;
    }
    .container{
      max-width:1100px;
      margin:0 auto;
      padding:118px 16px 40px;
    }
    .hero{
      text-align:center;
      padding:24px 0 18px;
    }
    h1{
      margin:0 0 12px;
      font-size:clamp(2rem, 4vw, 3.6rem);
      line-height:1.05;
      letter-spacing:-.03em;
    }
    .subtitle{
      margin:0 auto;
      max-width:780px;
      color:var(--muted);
      font-size:1.02rem;
      line-height:1.7;
    }
    .panel{
      background:var(--card);
      color:#14213a;
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-top:22px;
    }
    .panel-head{
      padding:20px 20px 14px;
      border-bottom:1px solid #e7efff;
      background:linear-gradient(180deg, #ffffff, #f8fbff);
    }
    .panel-head h2{
      margin:0;
      font-size:1.15rem;
    }
    .panel-head p{
      margin:8px 0 0;
      color:#5c6b88;
    }
    .quiz-area{
      padding:18px;
      display:grid;
      gap:14px;
    }
    .question-card{
      border:1px solid #dbe7ff;
      border-left:5px solid var(--primary);
      border-radius:16px;
      padding:18px;
      background:linear-gradient(180deg, #fff, #fbfdff);
      box-shadow: 0 8px 22px rgba(37,99,235,.06);
    }
    .question-title{
      margin:0 0 14px;
      font-size:1.05rem;
      line-height:1.55;
      color:#10203d;
    }
    .options{
      display:grid;
      gap:10px;
    }
    .option{
      border:1px solid #d7e4ff;
      background:#fff;
      border-radius:14px;
      padding:12px 14px;
      cursor:pointer;
      transition:.18s ease;
      display:flex;
      align-items:flex-start;
      gap:12px;
      color:#1a2b49;
    }
    .option:hover{
      transform:translateY(-1px);
      border-color:#9fc0ff;
      box-shadow:0 8px 18px rgba(37,99,235,.08);
    }
    .option.locked{cursor:default; pointer-events:none}
    .option.correct{
      border-color:rgba(22,163,74,.35);
      background:rgba(22,163,74,.08);
    }
    .option.wrong{
      border-color:rgba(220,38,38,.35);
      background:rgba(220,38,38,.07);
    }
    .feedback{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      font-size:.96rem;
      line-height:1.6;
      display:none;
    }
    .feedback.show{display:block}
    .feedback.correct{
      background:rgba(22,163,74,.09);
      border:1px solid rgba(22,163,74,.24);
      color:#146c34;
    }
    .feedback.wrong{
      background:rgba(220,38,38,.08);
      border:1px solid rgba(220,38,38,.22);
      color:#9b1c1c;
    }
    .feedback.skip{
      background:rgba(245,158,11,.1);
      border:1px solid rgba(245,158,11,.28);
      color:#8a5b00;
    }
    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:20px;
    }
    .btn-submit{
      background:linear-gradient(180deg, #3b82f6, #2563eb);
      color:#fff;
      box-shadow:0 10px 24px rgba(37,99,235,.25);
      padding:13px 18px;
      min-width:220px;
    }
    .btn-submit:hover{transform:translateY(-1px)}
    .btn-retry{
      background:#0f172a;
      color:#fff;
      padding:13px 18px;
      min-width:180px;
    }
    .results{
      margin-top:20px;
      display:grid;
      gap:14px;
    }
    .result-card{
      background:#fff;
      color:#15213a;
      border:1px solid #dbe7ff;
      border-radius:16px;
      padding:18px;
      box-shadow:0 10px 26px rgba(0,0,0,.06);
    }
    .result-card h3{margin:0 0 10px}
    .result-summary{
      display:grid;
      gap:8px;
      font-weight:600;
    }
    .recap-item{
      border-top:1px solid #edf3ff;
      padding-top:14px;
      margin-top:14px;
    }
    .tag{
      display:inline-block;
      font-size:.78rem;
      font-weight:800;
      letter-spacing:.02em;
      padding:6px 10px;
      border-radius:999px;
      margin-bottom:8px;
    }
    .tag.bad{background:rgba(220,38,38,.1); color:#a4161a}
    .tag.skip{background:rgba(245,158,11,.12); color:#8a5b00}
    .tag.ok{background:rgba(22,163,74,.1); color:#146c34}
    .hidden{display:none !important;}
    .footer-space{height:20px}
    @media (max-width: 760px){
      .topbar-inner{
        grid-template-columns:1fr;
      }
      .stats-row{
        gap:8px 12px;
      }
      .container{
        padding-top:170px;
      }
      .quiz-area{padding:14px}
      .question-card{padding:16px}
      .btn-submit,.btn-retry{width:100%}
    }
  </style>
</head>

    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const quizData = questions.map((item) => {
      const paired = item.opts.map((opt, idx) => ({ opt, isCorrect: idx === item.ans }));
      const shuffled = shuffleArray(paired);
      return {
        ...item,
        shuffledOpts: shuffled.map(x => x.opt),
        correctIndex: shuffled.findIndex(x => x.isCorrect)
      };
    });

    const quizArea = document.getElementById("quizArea");
    const resultsSection = document.getElementById("resultsSection");
    const scoreText = document.getElementById("scoreText");
    const answeredText = document.getElementById("answeredText");
    const totalText = document.getElementById("totalText");
    const progressBar = document.getElementById("progressBar");
    const statusText = document.getElementById("statusText");
    const submitBtn = document.getElementById("submitBtn");

    totalText.textContent = quizData.length;

    const state = {
      answered: Array(quizData.length).fill(null),
      locked: Array(quizData.length).fill(false),
      submitted: false,
      score: 0
    };

    function renderQuiz(){
      quizArea.innerHTML = "";
      quizData.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "question-card";
        card.innerHTML = `
          <h3 class="question-title">${item.q}</h3>
          <div class="options" id="options-${index}"></div>
          <div class="feedback" id="feedback-${index}"></div>
        `;
        quizArea.appendChild(card);

        const optionsWrap = card.querySelector(`#options-${index}`);
        item.shuffledOpts.forEach((opt, optIndex) => {
          const label = document.createElement("label");
          label.className = "option";
          label.innerHTML = `
            <input type="radio" name="q-${index}" value="${optIndex}" />
            <span><strong>${String.fromCharCode(65 + optIndex)}.</strong> ${opt}</span>
          `;
          label.addEventListener("click", () => selectAnswer(index, optIndex));
          optionsWrap.appendChild(label);
        });
      });
    }

    function selectAnswer(qIndex, optIndex){
      if (state.locked[qIndex] || state.submitted) return;
      state.answered[qIndex] = optIndex;
      state.locked[qIndex] = true;

      const item = quizData[qIndex];
      const options = document.querySelectorAll(`#options-${qIndex} .option`);
      const feedback = document.getElementById(`feedback-${qIndex}`);

      options.forEach((el, idx) => {
        el.classList.add("locked");
        if (idx === item.correctIndex) el.classList.add("correct");
        if (idx === optIndex && optIndex !== item.correctIndex) el.classList.add("wrong");
        const input = el.querySelector("input");
        input.checked = idx === optIndex;
        input.disabled = true;
      });

      const isCorrect = optIndex === item.correctIndex;
      feedback.className = `feedback show ${isCorrect ? "correct" : "wrong"}`;
      feedback.innerHTML = isCorrect
        ? `<strong>Correct.</strong> ${item.exp}`
        : `<strong>Incorrect.</strong> ${item.exp}`;
      updateTopbar();
    }

    function updateTopbar(){
      const answeredCount = state.answered.filter(v => v !== null).length;
      const score = state.answered.reduce((acc, val, idx) => acc + (val === quizData[idx].correctIndex ? 1 : 0), 0);
      state.score = score;
      scoreText.textContent = score;
      answeredText.textContent = answeredCount;
      progressBar.style.width = `${(answeredCount / quizData.length) * 100}%`;
    }

    function submitQuiz(){
      state.submitted = true;
      let score = 0;
      const wrong = [];
      const skipped = [];

      quizData.forEach((q, idx) => {
        const userAns = state.answered[idx];
        if (userAns === null) {
          skipped.push(idx);
        } else if (userAns === q.correctIndex) {
          score++;
        } else {
          wrong.push(idx);
        }

        const feedback = document.getElementById(`feedback-${idx}`);
        const options = document.querySelectorAll(`#options-${idx} .option`);

        if (userAns === null) {
          options[q.correctIndex].classList.add("correct");
          feedback.className = "feedback show skip";
          feedback.innerHTML = `<strong>Skipped.</strong> ${q.exp}`;
        } else {
          options.forEach((el, optIndex) => {
            if (optIndex === q.correctIndex) el.classList.add("correct");
            if (optIndex === userAns && userAns !== q.correctIndex) el.classList.add("wrong");
            el.classList.add("locked");
            el.querySelector("input").disabled = true;
          });
        }
      });

      state.score = score;
      scoreText.textContent = score;
      answeredText.textContent = quizData.length;
      progressBar.style.width = `100%`;
      statusText.textContent = "Completed";

      resultsSection.innerHTML = `
        <div class="result-card">
          <h3>Results Summary</h3>
          <div class="result-summary">
            <div>Score: ${score} / ${quizData.length}</div>
            <div>Correct: ${score}</div>
            <div>Wrong: ${wrong.length}</div>
            <div>Skipped: ${skipped.length}</div>
          </div>
          <div class="actions" style="justify-content:flex-start; margin-top:16px;">
            <button class="btn btn-retry" id="retryBtn">Retry Quiz</button>
          </div>
        </div>
        ${wrong.length ? `
          <div class="result-card">
            <h3>Incorrect Answers Recap</h3>
            ${wrong.map(i => `
              <div class="recap-item">
                <div class="tag bad">Wrong</div>
                <div><strong>Q${i + 1}.</strong> ${quizData[i].q}</div>
                <div><strong>Your answer:</strong> ${quizData[i].shuffledOpts[state.answered[i]]}</div>
                <div><strong>Correct answer:</strong> ${quizData[i].shuffledOpts[quizData[i].correctIndex]}</div>
                <div><strong>Explanation:</strong> ${quizData[i].exp}</div>
              </div>
            `).join("")}
          </div>` : ""}
        ${skipped.length ? `
          <div class="result-card">
            <h3>Skipped Questions Recap</h3>
            ${skipped.map(i => `
              <div class="recap-item">
                <div class="tag skip">Skipped</div>
                <div><strong>Q${i + 1}.</strong> ${quizData[i].q}</div>
                <div><strong>Correct answer:</strong> ${quizData[i].shuffledOpts[quizData[i].correctIndex]}</div>
                <div><strong>Explanation:</strong> ${quizData[i].exp}</div>
              </div>
            `).join("")}
          </div>` : ""}
      `;

      document.getElementById("retryBtn").addEventListener("click", retryQuiz);
      submitBtn.classList.add("hidden");
      quizArea.querySelectorAll(".option").forEach(el => el.classList.add("locked"));
    }

    function retryQuiz(){
      state.answered = Array(quizData.length).fill(null);
      state.locked = Array(quizData.length).fill(false);
      state.submitted = false;
      state.score = 0;
      resultsSection.innerHTML = "";
      statusText.textContent = "In progress";
      submitBtn.classList.remove("hidden");
      renderQuiz();
      updateTopbar();
    }

    submitBtn.addEventListener("click", submitQuiz);
    renderQuiz();
    updateTopbar();
  </script>
