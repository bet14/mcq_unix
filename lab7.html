<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linux Networking Quiz</title>
  <style>
    :root{
      --bg:#0b1220;
      --bg2:#111a2e;
      --card:#ffffff;
      --text:#e9eefb;
      --muted:#9aa8c7;
      --primary:#3b82f6;
      --primary2:#2563eb;
      --border:#cfe0ff;
      --ok:#16a34a;
      --bad:#dc2626;
      --skip:#f59e0b;
      --shadow: 0 14px 40px rgba(0,0,0,.22);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.25), transparent 24%),
        radial-gradient(circle at top right, rgba(37,99,235,.18), transparent 22%),
        linear-gradient(180deg, var(--bg), #08101d 70%, #060b14);
      color:var(--text);
      min-height:100vh;
    }
    .topbar{
      position:fixed;
      top:0; left:0; right:0;
      z-index:1000;
      background: rgba(7, 13, 24, .78);
      backdrop-filter: blur(12px);
      border-bottom:1px solid rgba(207,224,255,.16);
      box-shadow: 0 8px 30px rgba(0,0,0,.18);
    }
    .topbar-inner{
      max-width:1100px;
      margin:0 auto;
      padding:14px 16px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:14px;
      align-items:center;
    }
    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      border-radius:12px;
      padding:10px 14px;
      font-weight:700;
      transition:.2s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      white-space:nowrap;
    }
    .btn-back{
      background:linear-gradient(180deg, #1d4ed8, #1e40af);
      color:#fff;
      box-shadow: 0 8px 18px rgba(37,99,235,.28);
    }
    .btn-back:hover{transform:translateY(-1px); filter:brightness(1.05)}
    .top-info{
      display:grid;
      gap:8px;
    }
    .stats-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px 16px;
      align-items:center;
      justify-content:space-between;
      font-size:14px;
      color:var(--text);
    }
    .stat{
      display:flex;
      gap:8px;
      align-items:center;
      font-weight:600;
    }
    .progress-wrap{
      height:12px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(207,224,255,.18);
    }
    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #60a5fa, #2563eb);
      border-radius:999px;
      transition:width .25s ease;
    }
    .container{
      max-width:1100px;
      margin:0 auto;
      padding:118px 16px 40px;
    }
    .hero{
      text-align:center;
      padding:24px 0 18px;
    }
    h1{
      margin:0 0 12px;
      font-size:clamp(2rem, 4vw, 3.6rem);
      line-height:1.05;
      letter-spacing:-.03em;
    }
    .subtitle{
      margin:0 auto;
      max-width:780px;
      color:var(--muted);
      font-size:1.02rem;
      line-height:1.7;
    }
    .panel{
      background:var(--card);
      color:#14213a;
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-top:22px;
    }
    .panel-head{
      padding:20px 20px 14px;
      border-bottom:1px solid #e7efff;
      background:linear-gradient(180deg, #ffffff, #f8fbff);
    }
    .panel-head h2{
      margin:0;
      font-size:1.15rem;
    }
    .panel-head p{
      margin:8px 0 0;
      color:#5c6b88;
    }
    .quiz-area{
      padding:18px;
      display:grid;
      gap:14px;
    }
    .question-card{
      border:1px solid #dbe7ff;
      border-left:5px solid var(--primary);
      border-radius:16px;
      padding:18px;
      background:linear-gradient(180deg, #fff, #fbfdff);
      box-shadow: 0 8px 22px rgba(37,99,235,.06);
    }
    .question-title{
      margin:0 0 14px;
      font-size:1.05rem;
      line-height:1.55;
      color:#10203d;
    }
    .options{
      display:grid;
      gap:10px;
    }
    .option{
      border:1px solid #d7e4ff;
      background:#fff;
      border-radius:14px;
      padding:12px 14px;
      cursor:pointer;
      transition:.18s ease;
      display:flex;
      align-items:flex-start;
      gap:12px;
      color:#1a2b49;
    }
    .option:hover{
      transform:translateY(-1px);
      border-color:#9fc0ff;
      box-shadow:0 8px 18px rgba(37,99,235,.08);
    }
    .option.locked{cursor:default; pointer-events:none}
    .option.correct{
      border-color:rgba(22,163,74,.35);
      background:rgba(22,163,74,.08);
    }
    .option.wrong{
      border-color:rgba(220,38,38,.35);
      background:rgba(220,38,38,.07);
    }
    .feedback{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      font-size:.96rem;
      line-height:1.6;
      display:none;
    }
    .feedback.show{display:block}
    .feedback.correct{
      background:rgba(22,163,74,.09);
      border:1px solid rgba(22,163,74,.24);
      color:#146c34;
    }
    .feedback.wrong{
      background:rgba(220,38,38,.08);
      border:1px solid rgba(220,38,38,.22);
      color:#9b1c1c;
    }
    .feedback.skip{
      background:rgba(245,158,11,.1);
      border:1px solid rgba(245,158,11,.28);
      color:#8a5b00;
    }
    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:20px;
    }
    .btn-submit{
      background:linear-gradient(180deg, #3b82f6, #2563eb);
      color:#fff;
      box-shadow:0 10px 24px rgba(37,99,235,.25);
      padding:13px 18px;
      min-width:220px;
    }
    .btn-submit:hover{transform:translateY(-1px)}
    .btn-retry{
      background:#0f172a;
      color:#fff;
      padding:13px 18px;
      min-width:180px;
    }
    .results{
      margin-top:20px;
      display:grid;
      gap:14px;
    }
    .result-card{
      background:#fff;
      color:#15213a;
      border:1px solid #dbe7ff;
      border-radius:16px;
      padding:18px;
      box-shadow:0 10px 26px rgba(0,0,0,.06);
    }
    .result-card h3{margin:0 0 10px}
    .result-summary{
      display:grid;
      gap:8px;
      font-weight:600;
    }
    .recap-item{
      border-top:1px solid #edf3ff;
      padding-top:14px;
      margin-top:14px;
    }
    .tag{
      display:inline-block;
      font-size:.78rem;
      font-weight:800;
      letter-spacing:.02em;
      padding:6px 10px;
      border-radius:999px;
      margin-bottom:8px;
    }
    .tag.bad{background:rgba(220,38,38,.1); color:#a4161a}
    .tag.skip{background:rgba(245,158,11,.12); color:#8a5b00}
    .tag.ok{background:rgba(22,163,74,.1); color:#146c34}
    .hidden{display:none !important;}
    .footer-space{height:20px}
    @media (max-width: 760px){
      .topbar-inner{
        grid-template-columns:1fr;
      }
      .stats-row{
        gap:8px 12px;
      }
      .container{
        padding-top:170px;
      }
      .quiz-area{padding:14px}
      .question-card{padding:16px}
      .btn-submit,.btn-retry{width:100%}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="btn btn-back" href="index.html">← Back to index</a>
      <div class="top-info">
        <div class="stats-row">
          <div class="stat">Score: <span id="scoreText">0</span></div>
          <div class="stat">Answered: <span id="answeredText">0</span>/<span id="totalText">70</span></div>
        </div>
        <div class="progress-wrap" aria-label="Progress bar">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
      <div class="stat" style="justify-self:end;">Quiz Status: <span id="statusText">In progress</span></div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1> Quiz</h1>
      <p class="subtitle">
        Test your understanding of Linux 
      </p>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Quiz Area</h2>
        <p>Select an answer for each question. Each question locks after your choice and shows immediate feedback.</p>
      </div>
      <div class="quiz-area" id="quizArea"></div>
      <div class="actions">
        <button class="btn btn-submit" id="submitBtn">Submit &amp; See Results</button>
      </div>
    </section>

    <section class="results" id="resultsSection"></section>
    <div class="footer-space"></div>
  </main>

 <script>
  const questions = [
    {
      q: "1. Which shell parameter represents the first command-line argument?",
      opts: ["$$", "$1", "$@", "$#"],
      ans: 1,
      exp: " $$ expands to the current shell process ID, not the first argument. $1 is the first positional parameter. $@ expands to all positional parameters, and $# gives the number of arguments passed to the script."
    },
    {
      q: "2. Which shell parameter gives the number of arguments passed to a script?",
      opts: ["$0", "$#", "$*", "$!"],
      ans: 1,
      exp: "$0 stores the script name or command used to invoke the script. $# returns the count of arguments. $* expands all arguments as a single string, and $! gives the PID of the last background process."
    },
    {
      q: "3. What does $0 usually contain in a shell script?",
      opts: ["The first argument", "The script name", "The number of arguments", "All arguments as separate words"],
      ans: 1,
      exp: "$1 is the first argument. $0 usually contains the script name or the command used to launch it. $# is the number of arguments, and $@ is closer to all arguments as separate words."
    },
    {
      q: "4. What is the main purpose of shift in shell scripting?",
      opts: ["To delete a file", "To move positional parameters left", "To sort arguments alphabetically", "To pause the script"],
      ans: 1,
      exp: "shift has nothing to do with file deletion. It removes $1 and shifts the rest one position left. It does not sort anything, and pausing is done with commands like sleep."
    },
    {
      q: "5. After running shift once, what happens to the arguments?",
      opts: ["$2 becomes $1", "$1 becomes $2", "All arguments are deleted", "$0 becomes $1"],
      ans: 0,
      exp: "After shifting, $2 becomes $1. Only the first argument is removed per shift. $0 remains unchanged."
    },
    {
      q: "6. What does $@ represent in shell scripts?",
      opts: ["The script name", "The number of arguments", "All positional parameters as separate words", "The last argument only"],
      ans: 2,
      exp: "$0 is the script name. $# is the number of arguments. $@ expands to all positional parameters as separate words, not just the last one."
    },
    {
      q: "7. Which command is used to make a script executable?",
      opts: ["chmod +x script.sh", "touch +x script.sh", "run script.sh", "exec script.sh"],
      ans: 0,
      exp: "chmod +x script.sh adds execute permission. touch creates or updates timestamps, run is not standard for this purpose, and exec replaces the shell process."
    },
    {
      q: "8. Which syntax is correct to run a script named args.sh with three arguments A B C?",
      opts: ["./args.sh A B C", "bash A B C args.sh", "args.sh ./A ./B ./C", "./args.sh \"A B C\" only"],
      ans: 0,
      exp: "./args.sh A B C is the correct invocation with three separate arguments. The other choices either use the wrong order or pass one combined argument."
    },
    {
      q: "9. What is the effect of quoting \"hello world\" as a single argument?",
      opts: ["It becomes two arguments", "It becomes one argument with a space inside", "It is ignored by the shell", "It becomes $0"],
      ans: 1,
      exp: "Quotes prevent word splitting. \"hello world\" becomes one argument with a space inside. It is not ignored, and it does not become $0."
    },
    {
      q: "10. In the command ./args.sh \"hello\" \"world\", how many arguments are passed to the script?",
      opts: ["1", "2", "3", "0"],
      ans: 1,
      exp: "\"hello\" and \"world\" are two distinct arguments. The script receives two arguments."
    },
    {
      q: "11. What is the main purpose of defining a function in shell scripting?",
      opts: ["To store files", "To reuse a block of commands", "To change terminal colors", "To create environment variables automatically"],
      ans: 1,
      exp: "Functions do not store files. Their key purpose is to reuse a block of commands. They may change terminal colors indirectly, but that is not the main purpose."
    },
    {
      q: "12. Which syntax is used to define a shell function named greet_user?",
      opts: ["function greet_user { ... }", "greet_user() { ... }", "def greet_user: ...", "greet_user[] { ... }"],
      ans: 1,
      exp: "function greet_user { ... } is valid in some shells, but the common POSIX-style form is greet_user() { ... }. The other syntaxes are not shell syntax."
    },
    {
      q: "13. In a shell script, what does if [ -z \"$1\" ] test?",
      opts: ["Whether the first argument is numeric", "Whether the first argument is empty", "Whether the first argument is longer than zero", "Whether the script name is missing"],
      ans: 1,
      exp: "-z checks whether the string length is zero, so it tests whether the first argument is empty. It does not test the script name."
    },
    {
      q: "14. Why is it safer to write if [ -z \"$1\" ] instead of if [ -z $1 ]?",
      opts: ["Because quotes are required around command names", "Because quotes prevent word splitting and errors when empty", "Because quotes make the script faster", "Because $1 must always be inside braces"],
      ans: 1,
      exp: "Quotes prevent word splitting and syntax errors when the argument is empty. Speed is not the reason, and braces are not required here."
    },
    {
      q: "15. Which command prints a message to the terminal in shell scripts?",
      opts: ["print()", "echo", "show", "display"],
      ans: 1,
      exp: "echo is the standard command commonly used to print output in shell scripts."
    },
    {
      q: "16. What does the command date do?",
      opts: ["Deletes files by date", "Prints the current date and time", "Shows the system uptime only", "Changes the system clock automatically"],
      ans: 1,
      exp: "date prints the current date and time. It does not delete files or show uptime. It does not automatically change the system clock."
    },
    {
      q: "17. In Lab 3, what is the purpose of the add_a_user function?",
      opts: ["To delete users from the system", "To simulate creating a user using arguments", "To list all system users", "To change the password policy"],
      ans: 1,
      exp: "The lab describes creating users by simulation, not deleting or listing system users. The function simulates user creation using arguments."
    },
    {
      q: "18. In Lab 3, what should $1 be assigned to inside add_a_user?",
      opts: ["USER", "PASSWORD", "COMMENTS", "DATE"],
      ans: 0,
      exp: "The first argument is assigned to USER. PASSWORD comes from $2. Date is not part of the Lab 3 assignment."
    },
    {
      q: "19. In Lab 3, what should $2 be assigned to inside add_a_user?",
      opts: ["USER", "PASSWORD", "COMMENTS", "HOME"],
      ans: 1,
      exp: "USER comes from $1. The second argument is assigned to PASSWORD. COMMENTS are collected from the remaining arguments."
    },
    {
      q: "20. Why is shift used twice in Lab 3?",
      opts: ["To remove the first two arguments before capturing the rest", "To sort the remaining arguments", "To duplicate the first two arguments", "To convert arguments into uppercase"],
      ans: 0,
      exp: "Shift is used twice to remove the first two arguments so the remaining parameters can be captured as comments."
    },
    {
      q: "21. After assigning USER=$1 and PASSWORD=$2, what should be done before assigning COMMENTS=$@?",
      opts: ["exit", "shift twice", "unset $@", "pwd"],
      ans: 1,
      exp: "Shift twice removes the first two positional parameters, leaving the rest in $@. exit would stop the function, and pwd is unrelated."
    },
    {
      q: "22. What does COMMENTS=$@ capture after two shifts in Lab 3?",
      opts: ["Only the first argument", "Only the second argument", "All remaining arguments", "The script name"],
      ans: 2,
      exp: "After two shifts, the first two original parameters are removed. $@ now contains all remaining arguments."
    },
    {
      q: "23. Which statement best describes shift?",
      opts: ["It removes the current $1 and renumbers the rest", "It adds one to every argument", "It changes $0 into $1", "It combines all arguments into one string"],
      ans: 0,
      exp: "shift removes the current $1 and renumbers the rest. It does not change $0 or combine arguments."
    },
    {
      q: "24. What is the main difference between $* and $@ in shell scripting?",
      opts: ["They are always identical in every context", "$@ preserves separate arguments better than $*", "$* is for variables and $@ is for constants", "$@ only works in functions"],
      ans: 1,
      exp: "$@ preserves separate arguments better than $*, especially when quoted. They are not always identical."
    },
    {
      q: "25. Which command is most likely used in Lab 3 to simulate user creation?",
      opts: ["useradd", "echo", "passwd", "cat"],
      ans: 1,
      exp: "The lab explicitly mentions simulating with echo commands. useradd creates real users, passwd changes passwords, and cat displays file contents."
    },
    {
      q: "26. What should adduser.sh contain according to Lab 3?",
      opts: ["Only global variables", "A function named add_a_user", "A loop that reads from a file", "Only the date command"],
      ans: 1,
      exp: "The lab specifically requires a function named add_a_user."
    },
    {
      q: "27. Which call style is consistent with Lab 3’s requirement to call the function twice with different arguments?",
      opts: ["Call add_a_user once and stop", "Call add_a_user two times using different values", "Call add_a_user only inside another script", "Avoid calling the function"],
      ans: 1,
      exp: "The lab requires calling add_a_user two times using different values. Calling it once or avoiding it does not satisfy the requirement."
    },
    {
      q: "28. In Lab 4, what is the name of the function to define?",
      opts: ["add_a_user", "greet_user", "say_date", "validate_name"],
      ans: 1,
      exp: "add_a_user is from Lab 3. The function required in Lab 4 is greet_user."
    },
    {
      q: "29. What should happen in greet_user if the name is missing?",
      opts: ["Print a random greeting", "Show an error", "Create a new file", "Exit silently without any output"],
      ans: 1,
      exp: "The lab requires validation. If the name is missing, greet_user should show an error message."
    },
    {
      q: "30. What should greet_user print when a name is provided?",
      opts: ["Hello, NAME. Today is DATE.", "Goodbye, NAME.", "USER created successfully", "Today is NAME."],
      ans: 0,
      exp: "This matches the required output format: Hello, NAME. Today is DATE."
    },
    {
      q: "31. What does the example ./greet.sh Thomas demonstrate?",
      opts: ["Passing no arguments", "Passing one argument to the script", "Running the script as root", "Passing two arguments with quotes"],
      ans: 1,
      exp: "The example shows one argument, Thomas, being passed to the script."
    },
    {
      q: "32. What should the output of ./greet.sh Thomas look like conceptually?",
      opts: ["Hello, Thomas. Today is <current date>.", "Hello, World.", "Error: no name", "Thomas says hello"],
      ans: 0,
      exp: "The lab description matches Hello, Thomas. Today is <current date>."
    },
    {
      q: "33. Which test is most appropriate to check whether an argument is missing in shell?",
      opts: ["[ -z \"$1\" ]", "[ \"$1\" -gt 0 ]", "[ \"$1\" = \"missing\" ]", "[ -f \"$1\" ]"],
      ans: 0,
      exp: "[ -z \"$1\" ] checks whether the argument is empty. The other tests check numeric comparison, string equality, or file existence."
    },
    {
      q: "34. Which statement best describes positional parameters?",
      opts: ["They are the same as environment variables", "They are arguments passed to a script or function", "They are only used in Python", "They cannot be accessed inside functions"],
      ans: 1,
      exp: "Positional parameters are arguments passed to a script or function. They are not the same as environment variables."
    },
    {
      q: "35. Which of the following is the best reason to use functions in shell scripts?",
      opts: ["To avoid writing repeated code", "To make the script longer", "To reduce the number of variables to zero", "To prevent the use of arguments"],
      ans: 0,
      exp: "One of the main benefits of functions is avoiding repeated code. They do not exist to make the script longer or prevent arguments."
    },
    {
      q: "36. What does shift do if there are no arguments left to shift?",
      opts: ["It creates a new argument", "It has no useful effect", "It crashes the operating system", "It prints the current date"],
      ans: 1,
      exp: "If nothing remains, shifting does not help and has no useful effect."
    },
    {
      q: "37. Which command-line pattern keeps arguments with spaces together as one argument?",
      opts: ["No quotes", "Single or double quotes", "Backspace characters", "Semicolons only"],
      ans: 1,
      exp: "Quotes preserve the argument as one unit. Without quotes, spaces split arguments."
    },
    {
      q: "38. Which command best fits the lab requirement to “simulate creating users with echo commands”?",
      opts: ["echo \"Creating user...\"", "mkdir user", "rm user", "cp user"],
      ans: 0,
      exp: "echo is the correct simulation method. mkdir makes directories, rm deletes, and cp copies files."
    },
    {
      q: "39. What is the purpose of validation in Lab 4?",
      opts: ["To ensure the name argument exists before greeting", "To rename the script automatically", "To count the number of files in the directory", "To make the date command faster"],
      ans: 0,
      exp: "Validation ensures the name argument exists before greeting. The other choices are unrelated."
    },
    {
      q: "40. Which variable typically stores the name passed to greet_user?",
      opts: ["$0", "$1", "$#", "$@"],
      ans: 1,
      exp: "$0 is the script name. $1 is the first argument, likely the name. $# is the number of arguments, and $@ represents all arguments."
    },
    {
      q: "41. Which command would most likely be used to display the current system date in the greeting script?",
      opts: ["date", "time", "calendar", "clock"],
      ans: 0,
      exp: "date prints the current date and time. time is usually for command duration, and calendar or clock are not the standard shell commands here."
    },
    {
      q: "42. Which of the following is the best interpretation of ./greet.sh Thomas?",
      opts: ["Run the script in the current directory with Thomas as input", "Open the script in an editor", "Delete the script after running it", "Copy Thomas into the script"],
      ans: 0,
      exp: "./greet.sh Thomas runs the script in the current directory and passes Thomas as input."
    },
    {
      q: "43. What is the shell meaning of “positional parameters”?",
      opts: ["Parameters that depend on screen size", "Parameters identified by their position: $1, $2, $3, and so on", "Parameters stored only in arrays", "Parameters that are always global"],
      ans: 1,
      exp: "Positional parameters are identified by position: $1, $2, $3, and so on."
    },
    {
      q: "44. Why is it important to quote \"$1\" in condition tests?",
      opts: ["It turns the argument into a number", "It prevents syntax errors when the argument is empty or contains spaces", "It makes shift unnecessary", "It changes the script name"],
      ans: 1,
      exp: "Quoting $1 prevents syntax errors when the argument is empty or contains spaces. It does not turn it into a number or replace shift."
    },
    {
      q: "45. Which of these is a valid concept for Lab 3?",
      opts: ["Using shift to move from user name to password to comments", "Using shift to delete the script file", "Using shift to print the date", "Using shift to rename variables automatically"],
      ans: 0,
      exp: "Lab 3 uses shift to move from user name to password to comments. Shift does not delete files, print date, or rename variables."
    },
    {
      q: "46. Which output format is closest to the lab requirement for greeting?",
      opts: ["Hello, NAME. Today is DATE.", "NAME: DATE", "DATE says hello to NAME", "Hello DATE NAME"],
      ans: 0,
      exp: "Hello, NAME. Today is DATE. matches the required format. The other options do not preserve the required structure."
    },
    {
      q: "47. What does the shell command shift 2 do?",
      opts: ["Removes the first two positional parameters", "Removes the last two positional parameters", "Doubles the first argument", "Counts two arguments"],

    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const quizData = questions.map((item) => {
      const paired = item.opts.map((opt, idx) => ({ opt, isCorrect: idx === item.ans }));
      const shuffled = shuffleArray(paired);
      return {
        ...item,
        shuffledOpts: shuffled.map(x => x.opt),
        correctIndex: shuffled.findIndex(x => x.isCorrect)
      };
    });

    const quizArea = document.getElementById("quizArea");
    const resultsSection = document.getElementById("resultsSection");
    const scoreText = document.getElementById("scoreText");
    const answeredText = document.getElementById("answeredText");
    const totalText = document.getElementById("totalText");
    const progressBar = document.getElementById("progressBar");
    const statusText = document.getElementById("statusText");
    const submitBtn = document.getElementById("submitBtn");

    totalText.textContent = quizData.length;

    const state = {
      answered: Array(quizData.length).fill(null),
      locked: Array(quizData.length).fill(false),
      submitted: false,
      score: 0
    };

    function renderQuiz(){
      quizArea.innerHTML = "";
      quizData.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "question-card";
        card.innerHTML = `
          <h3 class="question-title">${item.q}</h3>
          <div class="options" id="options-${index}"></div>
          <div class="feedback" id="feedback-${index}"></div>
        `;
        quizArea.appendChild(card);

        const optionsWrap = card.querySelector(`#options-${index}`);
        item.shuffledOpts.forEach((opt, optIndex) => {
          const label = document.createElement("label");
          label.className = "option";
          label.innerHTML = `
            <input type="radio" name="q-${index}" value="${optIndex}" />
            <span><strong>${String.fromCharCode(65 + optIndex)}.</strong> ${opt}</span>
          `;
          label.addEventListener("click", () => selectAnswer(index, optIndex));
          optionsWrap.appendChild(label);
        });
      });
    }

    function selectAnswer(qIndex, optIndex){
      if (state.locked[qIndex] || state.submitted) return;
      state.answered[qIndex] = optIndex;
      state.locked[qIndex] = true;

      const item = quizData[qIndex];
      const options = document.querySelectorAll(`#options-${qIndex} .option`);
      const feedback = document.getElementById(`feedback-${qIndex}`);

      options.forEach((el, idx) => {
        el.classList.add("locked");
        if (idx === item.correctIndex) el.classList.add("correct");
        if (idx === optIndex && optIndex !== item.correctIndex) el.classList.add("wrong");
        const input = el.querySelector("input");
        input.checked = idx === optIndex;
        input.disabled = true;
      });

      const isCorrect = optIndex === item.correctIndex;
      feedback.className = `feedback show ${isCorrect ? "correct" : "wrong"}`;
      feedback.innerHTML = isCorrect
        ? `<strong>Correct.</strong> ${item.exp}`
        : `<strong>Incorrect.</strong> ${item.exp}`;
      updateTopbar();
    }

    function updateTopbar(){
      const answeredCount = state.answered.filter(v => v !== null).length;
      const score = state.answered.reduce((acc, val, idx) => acc + (val === quizData[idx].correctIndex ? 1 : 0), 0);
      state.score = score;
      scoreText.textContent = score;
      answeredText.textContent = answeredCount;
      progressBar.style.width = `${(answeredCount / quizData.length) * 100}%`;
    }

    function submitQuiz(){
      state.submitted = true;
      let score = 0;
      const wrong = [];
      const skipped = [];

      quizData.forEach((q, idx) => {
        const userAns = state.answered[idx];
        if (userAns === null) {
          skipped.push(idx);
        } else if (userAns === q.correctIndex) {
          score++;
        } else {
          wrong.push(idx);
        }

        const feedback = document.getElementById(`feedback-${idx}`);
        const options = document.querySelectorAll(`#options-${idx} .option`);

        if (userAns === null) {
          options[q.correctIndex].classList.add("correct");
          feedback.className = "feedback show skip";
          feedback.innerHTML = `<strong>Skipped.</strong> ${q.exp}`;
        } else {
          options.forEach((el, optIndex) => {
            if (optIndex === q.correctIndex) el.classList.add("correct");
            if (optIndex === userAns && userAns !== q.correctIndex) el.classList.add("wrong");
            el.classList.add("locked");
            el.querySelector("input").disabled = true;
          });
        }
      });

      state.score = score;
      scoreText.textContent = score;
      answeredText.textContent = quizData.length;
      progressBar.style.width = `100%`;
      statusText.textContent = "Completed";

      resultsSection.innerHTML = `
        <div class="result-card">
          <h3>Results Summary</h3>
          <div class="result-summary">
            <div>Score: ${score} / ${quizData.length}</div>
            <div>Correct: ${score}</div>
            <div>Wrong: ${wrong.length}</div>
            <div>Skipped: ${skipped.length}</div>
          </div>
          <div class="actions" style="justify-content:flex-start; margin-top:16px;">
            <button class="btn btn-retry" id="retryBtn">Retry Quiz</button>
          </div>
        </div>
        ${wrong.length ? `
          <div class="result-card">
            <h3>Incorrect Answers Recap</h3>
            ${wrong.map(i => `
              <div class="recap-item">
                <div class="tag bad">Wrong</div>
                <div><strong>Q${i + 1}.</strong> ${quizData[i].q}</div>
                <div><strong>Your answer:</strong> ${quizData[i].shuffledOpts[state.answered[i]]}</div>
                <div><strong>Correct answer:</strong> ${quizData[i].shuffledOpts[quizData[i].correctIndex]}</div>
                <div><strong>Explanation:</strong> ${quizData[i].exp}</div>
              </div>
            `).join("")}
          </div>` : ""}
        ${skipped.length ? `
          <div class="result-card">
            <h3>Skipped Questions Recap</h3>
            ${skipped.map(i => `
              <div class="recap-item">
                <div class="tag skip">Skipped</div>
                <div><strong>Q${i + 1}.</strong> ${quizData[i].q}</div>
                <div><strong>Correct answer:</strong> ${quizData[i].shuffledOpts[quizData[i].correctIndex]}</div>
                <div><strong>Explanation:</strong> ${quizData[i].exp}</div>
              </div>
            `).join("")}
          </div>` : ""}
      `;

      document.getElementById("retryBtn").addEventListener("click", retryQuiz);
      submitBtn.classList.add("hidden");
      quizArea.querySelectorAll(".option").forEach(el => el.classList.add("locked"));
    }

    function retryQuiz(){
      state.answered = Array(quizData.length).fill(null);
      state.locked = Array(quizData.length).fill(false);
      state.submitted = false;
      state.score = 0;
      resultsSection.innerHTML = "";
      statusText.textContent = "In progress";
      submitBtn.classList.remove("hidden");
      renderQuiz();
      updateTopbar();
    }

    submitBtn.addEventListener("click", submitQuiz);
    renderQuiz();
    updateTopbar();
  </script>
