    q: "What does <code>grep -l \"password\" *.conf</code> output?",
    options: [
      "All lines containing 'password' in .conf files",
      "Only the filenames of .conf files that contain 'password'",
      "The count of matches in each .conf file",
      "Lines NOT containing 'password' in .conf files"
    ],
    answer: 1,
    explanation: "<code>-l</code> lists only the <strong>filenames</strong> that contain at least one match, not the matching lines themselves."
  },
  {
    tag: "grep",
    q: "Which command is equivalent to <code>grep \"root\" /etc/passwd</code>?",
    options: [
      "cat /etc/passwd | sort root",
      "cat /etc/passwd | grep root",
      "grep /etc/passwd | root",
      "find /etc/passwd -name root"
    ],
    answer: 1,
    explanation: "Both commands search for 'root' in <code>/etc/passwd</code>. The pipe version passes the file content through stdin to grep."
  },
  {
    tag: "grep",
    q: "You want to find a file named <code>config.txt</code> anywhere on the system. Which command is correct?",
    options: [
      "grep -r config.txt /",
      "ls -la config.txt",
      "sudo find / -name \"config.txt\"",
      "cat / | grep config.txt"
    ],
    answer: 2,
    explanation: "<code>sudo find / -name \"config.txt\"</code> searches the entire filesystem. <code>sudo</code> is needed to access all directories."
  },
  {
    tag: "grep",
    q: "In the logs.txt exercise, which command finds ALL lines containing 'error' regardless of case?",
    options: [
      "grep \"error\" logs.txt",
      "grep -v \"error\" logs.txt",
      "grep -i \"error\" logs.txt",
      "grep -n \"ERROR\" logs.txt"
    ],
    answer: 2,
    explanation: "<code>grep -i</code> performs a <strong>case-insensitive</strong> match, catching 'error', 'ERROR', 'Error', etc."
  }
];

let answered = new Array(questions.length).fill(null);

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const letters = ['A','B','C','D'];
    const optionsHTML = q.options.map((opt, j) =>
      `<button class="option-btn" id="opt-${i}-${j}" onclick="selectAnswer(${i},${j})">
        <span class="opt-label">${letters[j]}</span> ${opt}
       </button>`
    ).join('');

    card.innerHTML = `
      <div class="tag">${q.tag}</div>
      <div class="q-header">
        <div class="q-number">${i+1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options">${optionsHTML}</div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    container.appendChild(card);
  });
  updateProgress();
}

function selectAnswer(qIdx, optIdx) {
  if (answered[qIdx] !== null) return;
  answered[qIdx] = optIdx;

  const correct = questions[qIdx].answer;
  const fb = document.getElementById('fb-' + qIdx);
  const card = document.getElementById('card-' + qIdx);

  for (let j = 0; j < 4; j++) {
    const btn = document.getElementById(`opt-${qIdx}-${j}`);
    btn.disabled = true;
    if (j === correct) btn.classList.add('reveal-correct');
  }

  const chosenBtn = document.getElementById(`opt-${qIdx}-${optIdx}`);
  if (optIdx === correct) {
    chosenBtn.classList.remove('reveal-correct');
    chosenBtn.classList.add('correct');
    card.classList.add('answered-correct');
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = '✅ <strong>Correct!</strong> ' + questions[qIdx].explanation;
  } else {
    chosenBtn.classList.add('wrong');
    card.classList.add('answered-wrong');
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = '❌ <strong>Incorrect.</strong> ' + questions[qIdx].explanation;
  }
  updateProgress();
}

function updateProgress() {
  const done = answered.filter(a => a !== null).length;
  const pct = (done / questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + questions.length + ' answered';
}

function submitQuiz() {
  const unanswered = answered.filter(a => a === null).length;
  if (unanswered > 0) {
    if (!confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;
  }
  // Auto-answer remaining as wrong
  answered.forEach((a, i) => {
    if (a === null) selectAnswer(i, -1);
  });

  const correct = answered.filter((a, i) => a === questions[i].answer).length;
  const pct = Math.round((correct / questions.length) * 100);
  const panel = document.getElementById('scorePanel');
  document.getElementById('scoreBig').textContent = correct + ' / ' + questions.length + ' (' + pct + '%)';

	let msg = '';
  if (pct >= 90) msg = '🏆 Outstanding! You are fully ready for the mid-term!';
  else if (pct >= 75) msg = "🎉 Great job! A bit more review and you'll ace it!"; // Đã sửa dấu nháy kép ở đây
  else if (pct >= 60) msg = '📚 Good effort! Focus on the topics you missed.';
  else msg = '💪 Keep practicing! Review the session slides and retry.';

  document.getElementById('scoreMsg').textContent = msg;
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth' });
  document.getElementById('submitBtn').style.display = 'none';
}

function restartQuiz() {
  answered = new Array(questions.length).fill(null);
  document.getElementById('scorePanel').classList.remove('show');
  document.getElementById('submitBtn').style.display = 'block';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
