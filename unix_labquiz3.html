  {
    q: "Q42. What does the command ls -l display compared to ls?",
    hint: "Hint: -l stands for 'long format'.",
    options: [
      "Only lists files, not directories",
      "Lists files sorted by size",
      "Lists files with detailed info: permissions, owner, size, and modification date",
      "Lists files in reverse alphabetical order"
    ],
    answer: 2,
    explanation: "ls -l (long format) shows detailed information for each file: permissions, number of links, owner, group, size, date, and name."
  }
];

let answered = {};

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  answered = {};
  updateProgress();
  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card_' + idx;
    let optionsHTML = q.options.map((opt, oi) => {
      const letters = ['A','B','C','D'];
      return `<label class="option-label" id="opt_${idx}_${oi}" onclick="selectOption(${idx}, ${oi})">
        <input type="radio" name="q${idx}" value="${oi}">
        <span class="option-letter">${letters[oi]}</span>
        <span class="option-text">${opt}</span>
      </label>`;
    }).join('');
    card.innerHTML = `
      <div class="question-number">Question ${idx + 1} of ${questions.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="question-hint">${q.hint}</div>
      <div class="options" id="opts_${idx}">${optionsHTML}</div>
      <div class="feedback" id="fb_${idx}"></div>
    `;
    container.appendChild(card);
  });
}

function selectOption(qIdx, oIdx) {
  if (answered[qIdx] !== undefined) return;
  answered[qIdx] = oIdx;
  const q = questions[qIdx];
  const card = document.getElementById('card_' + qIdx);
  const fb = document.getElementById('fb_' + qIdx);
  for (let i = 0; i < q.options.length; i++) {
    const lbl = document.getElementById('opt_' + qIdx + '_' + i);
    lbl.style.pointerEvents = 'none';
    if (i === q.answer) lbl.classList.add('correct');
    if (i === oIdx && oIdx !== q.answer) lbl.classList.add('incorrect');
    if (i === oIdx) lbl.classList.add('selected');
  }
  if (oIdx === q.answer) {
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = '&#x2705; Correct! ' + q.explanation;
    card.classList.add('answered');
  } else {
    fb.className = 'feedback show incorrect-fb';
    fb.innerHTML = '&#x274C; Incorrect. ' + q.explanation;
    card.classList.add('wrong');
  }
  updateProgress();
}

function updateProgress() {
  const total = questions.length;
  const done = Object.keys(answered).length;
  document.getElementById('progressBar').style.width = (done / total * 100) + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' answered';
}

function submitQuiz() {
  let correct = 0, wrong = 0, skipped = 0;
  questions.forEach((q, idx) => {
    if (answered[idx] === undefined) {
      skipped++;
    } else if (answered[idx] === q.answer) {
      correct++;
    } else {
      wrong++;
    }
  });
  const total = questions.length;
  const pct = Math.round(correct / total * 100);
  document.getElementById('resultScore').textContent = pct + '%';
  let msg = '';
  if (pct >= 90) msg = '&#x1F3C6; Excellent! You mastered Unix commands!';
  else if (pct >= 70) msg = '&#x1F44D; Good job! Keep practicing!';
  else if (pct >= 50) msg = '&#x1F4AA; Not bad! Review the explanations and try again.';
  else msg = '&#x1F4DA; Keep studying! Read the explanations carefully.';
  document.getElementById('resultMsg').innerHTML = msg;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('skipCount').textContent = skipped;
  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth' });
}

function retryQuiz() {
  document.getElementById('resultPanel').classList.remove('show');
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
