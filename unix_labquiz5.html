      `lines: 3`,
      `3`,
      `errors.txt: 3 lines`
    ],
    answer: 0,
    explanation: `<code>wc -l</code> outputs the count followed by the filename: <code>3 errors.txt</code>. If reading from stdin (piped), it only shows the number.`
  },
  {
    q: `What is a here-document in bash?`,
    options: [
      `A document stored in the current directory`,
      `A redirection that feeds multiple lines of text as standard input to a command`,
      `A special comment block in shell scripts`,
      `A file automatically created by the shell`
    ],
    answer: 1,
    explanation: `A here-document (<code>&lt;&lt;DELIMITER</code>) is a form of I/O redirection that allows embedding multi-line strings directly in a script, feeding them as stdin to a command.`
  },
  {
    q: `What does <code>sort -nr</code> do in the context of <code>uniq -c</code> output?`,
    options: [
      `Sorts by name in reverse alphabetical order`,
      `Sorts numerically in descending order so the highest counts appear first`,
      `Removes numeric prefixes added by uniq -c`,
      `Normalizes and reverses the character encoding`
    ],
    answer: 1,
    explanation: `After <code>uniq -c</code> adds numeric counts, <code>sort -n</code> sorts those numbers correctly (not lexicographically), and <code>-r</code> puts the largest count first.`
  },
  {
    q: `Which command extracts timestamps from warning lines and counts their frequency?`,
    options: [
      `grep 'warn' fake_syslog.txt | wc -l`,
      `cut -d' ' -f1,2 warnings.txt | sort | uniq -c > warning_times.txt`,
      `awk '{print $1}' warnings.txt | sort`,
      `head -n 5 warnings.txt | cut -f1`
    ],
    answer: 1,
    explanation: `<code>cut -d' ' -f1,2 warnings.txt</code> extracts date+time, <code>sort</code> groups identical timestamps, <code>uniq -c</code> counts them, and <code>&gt;</code> saves to warning_times.txt.`
  },
  {
    q: `In awk, what does <code>length</code> (without arguments) return?`,
    options: [
      `The number of fields in the current record`,
      `The length of the current input line ($0)`,
      `The total number of lines processed`,
      `The length of the first field ($1)`
    ],
    answer: 1,
    explanation: `In awk, <code>length</code> without arguments is equivalent to <code>length($0)</code>, returning the number of characters in the current line.`
  },
  {
    q: `What would happen if you omit <code>sort</code> before <code>uniq -c</code> in the pipeline?`,
    options: [
      `uniq -c would still count all occurrences correctly`,
      `uniq -c would only count consecutive duplicates, missing non-adjacent ones`,
      `The pipeline would produce an error`,
      `uniq -c would sort the output automatically`
    ],
    answer: 1,
    explanation: `<code>uniq</code> only processes consecutive duplicate lines. Without <code>sort</code>, non-adjacent duplicates are treated as separate unique lines, giving incorrect counts.`
  },
  {
    q: `What does <code>grep -v 'error' fake_syslog.txt</code> do?`,
    options: [
      `Shows only lines containing 'error'`,
      `Shows all lines that do NOT contain 'error'`,
      `Counts lines containing 'error'`,
      `Replaces 'error' with an empty string`
    ],
    answer: 1,
    explanation: `<code>grep -v</code> inverts the match, outputting lines that do NOT match the pattern. It is the opposite of the default grep behavior.`
  },
  {
    q: `Which option makes grep show line numbers alongside matching lines?`,
    options: [
      `grep -c`,
      `grep -n`,
      `grep -l`,
      `grep -v`
    ],
    answer: 1,
    explanation: `<code>grep -n</code> prefixes each matching line with its line number in the file. <code>-c</code> counts matches, <code>-l</code> lists filenames, <code>-v</code> inverts the match.`
  },
  {
    q: `What is the correct interpretation of this pipeline: <code>grep 'error' fake_syslog.txt | cut -d' ' -f1,2 | sort | uniq -c</code>?`,
    options: [
      `Count total errors, then sort by date`,
      `Filter error lines, extract date+time, sort them, then count occurrences per timestamp`,
      `Find unique errors and display their timestamps`,
      `Sort all log lines and count duplicates`
    ],
    answer: 1,
    explanation: `Step by step: (1) <code>grep</code> filters error lines, (2) <code>cut</code> extracts date+time fields, (3) <code>sort</code> groups identical timestamps, (4) <code>uniq -c</code> counts each unique timestamp.`
  },
  {
    q: `What is the main benefit of saving intermediate results (like errors.txt, warnings.txt) to files instead of always using pipelines?`,
    options: [
      `Files are always faster than pipelines`,
      `Intermediate files can be reused multiple times without re-running the initial commands`,
      `Files use less disk space than pipelines`,
      `Files automatically compress the data`
    ],
    answer: 1,
    explanation: `Saving intermediate results to files allows you to reuse that data multiple times (e.g., errors.txt is used for wc, head, cut operations) without re-running grep each time.`
  }
];

let answered = 0, correctCount = 0, wrongCount = 0;
const total = questions.length;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const optionsHTML = q.options.map((opt, j) => {
      return `<button class="option-btn" id="opt-${i}-${j}" onclick="selectAnswer(${i}, ${j})">${opt}</button>`;
    }).join('');

    card.innerHTML = `
      <div class="question-header">
        <span class="q-number">Q${i+1}</span>
        <span class="q-text">${q.q}</span>
      </div>
      <div class="options" id="options-${i}">${optionsHTML}</div>
      <div class="feedback" id="feedback-${i}"></div>
    `;
    container.appendChild(card);
  });
  updateStats();
}

function selectAnswer(qIndex, optIndex) {
  const card = document.getElementById('card-' + qIndex);
  if (card.dataset.answered) return;
  card.dataset.answered = 'true';
  card.dataset.selected = optIndex;

  const buttons = document.querySelectorAll(`#options-${qIndex} .option-btn`);
  buttons.forEach(btn => btn.disabled = true);

  const q = questions[qIndex];
  const feedback = document.getElementById('feedback-' + qIndex);
  const selectedBtn = document.getElementById(`opt-${qIndex}-${optIndex}`);
  const correctBtn = document.getElementById(`opt-${qIndex}-${q.answer}`);

  answered++;

  if (optIndex === q.answer) {
    correctCount++;
    selectedBtn.className = 'option-btn selected-correct';
    card.className = 'question-card correct';
    feedback.className = 'feedback correct show';
    feedback.innerHTML = '&#x2705; Correct! ' + q.explanation;
  } else {
    wrongCount++;
    selectedBtn.className = 'option-btn selected-wrong';
    correctBtn.className = 'option-btn reveal-correct';
    card.className = 'question-card wrong';
    feedback.className = 'feedback wrong show';
    feedback.innerHTML = '&#x274C; Incorrect. ' + q.explanation;
  }
  updateStats();
}

function checkAll() {
  questions.forEach((q, i) => {
    const card = document.getElementById('card-' + i);
    if (!card.dataset.answered) {
      selectAnswer(i, -1);
    }
  });
}

function updateStats() {
  document.getElementById('answered').textContent = answered;
  document.getElementById('correct').textContent = correctCount;
  document.getElementById('wrong').textContent = wrongCount;
  const pct = answered > 0 ? Math.round((correctCount / answered) * 100) : 0;
  document.getElementById('score').textContent = pct + '%';
  document.getElementById('progress').style.width = Math.round((answered / total) * 100) + '%';
}

function resetQuiz() {
  answered = 0; correctCount = 0; wrongCount = 0;
  buildQuiz();
}

buildQuiz();
</script>
