    opts: ["Deletes the hello.sh file","Makes hello.sh executable","Copies hello.sh to /usr/bin","Adds hello.sh to PATH"],

  {

  },
  {

  {

    ans: 1,

    opts: ["Temporary aliases use single quotes; permanent use double quotes","Temporary aliases last only for the current session; permanent aliases are saved in ~/.bashrc","Temporary aliases work only in scripts; permanent ones work in terminal","There is no difference; all aliases are permanent"],

    ans: 1,

  },
  {

    opts: ["Resume interrupted transfers","-r: Recursive, copy subdirectories","Remote mode: force SSH","Read-only mode"],
    ans: 1,

  },
  {
    q: "What does the rsync -v option do?",
    opts: ["Verify checksums of transferred files","Verbose: show progress and file names during transfer","Use version 2 of the rsync protocol","Enable virtual filesystem mode"],
    ans: 1,
    exp: "The -v (verbose) option makes rsync display the names of files being transferred and other progress information."

];

let userAnswers = new Array(questions.length).fill(null);

function updateProgress() {
  const answered = userAnswers.filter(a => a !== null).length;
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-count').textContent = answered + ' / ' + questions.length;
  document.getElementById('header-progress').textContent = answered + ' / ' + questions.length + ' answered';
}

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach(function(q, i) {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;

    const qNum = document.createElement('div');
    qNum.className = 'q-number';
    qNum.textContent = 'Question ' + (i + 1) + ' of ' + questions.length;

    const qText = document.createElement('div');
    qText.className = 'q-text';
    qText.textContent = q.q;

    const opts = document.createElement('div');
    opts.className = 'options';

    q.opts.forEach(function(opt, j) {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.id = 'opt-' + i + '-' + j;
      btn.textContent = String.fromCharCode(65 + j) + '. ' + opt;
      btn.onclick = function() { selectAnswer(i, j); };
      opts.appendChild(btn);
    });

    const feedback = document.createElement('div');
    feedback.className = 'feedback';
    feedback.id = 'feedback-' + i;

    card.appendChild(qNum);
    card.appendChild(qText);
    card.appendChild(opts);
    card.appendChild(feedback);
    container.appendChild(card);
  });
}

function selectAnswer(qIdx, optIdx) {
  if (userAnswers[qIdx] !== null) return;
  userAnswers[qIdx] = optIdx;
  updateProgress();
  const q = questions[qIdx];
  const isCorrect = optIdx === q.ans;
  const card = document.getElementById('card-' + qIdx);
  const feedback = document.getElementById('feedback-' + qIdx);
  q.opts.forEach(function(_, j) {
    const btn = document.getElementById('opt-' + qIdx + '-' + j);
    btn.disabled = true;
    if (j === q.ans) btn.classList.add('reveal-correct');
    if (j === optIdx && !isCorrect) btn.classList.add('selected-wrong');
    if (j === optIdx && isCorrect) btn.classList.add('selected-correct');
  });
  card.classList.add(isCorrect ? 'correct' : 'incorrect');
  feedback.style.display = 'block';
  feedback.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');
  feedback.innerHTML = (isCorrect
    ? '<span class="feedback-icon">&#10004;</span><strong>Correct!</strong> '
    : '<span class="feedback-icon">&#10008;</span><strong>Incorrect.</strong> ') + q.exp;
}

function submitQuiz() {
  questions.forEach(function(_, i) {
    if (userAnswers[i] === null) {
      const card = document.getElementById('card-' + i);
      card.classList.add('skipped');
      const feedback = document.getElementById('feedback-' + i);
      feedback.style.display = 'block';
      feedback.className = 'feedback incorrect';
      feedback.innerHTML = '<span class="feedback-icon">&#9888;</span><strong>Skipped.</strong> ' + questions[i].exp;
      questions[i].opts.forEach(function(_, j) {
        const btn = document.getElementById('opt-' + i + '-' + j);
        btn.disabled = true;
        if (j === questions[i].ans) btn.classList.add('reveal-correct');
      });
    }
  });
  updateProgress();
  showRecap();
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('recap').scrollIntoView({ behavior: 'smooth' });
}

function showRecap() {
  let correct = 0, wrong = 0, skipped = 0;
  const wrongItems = [];
  questions.forEach(function(q, i) {
    const ua = userAnswers[i];
    if (ua === null) { skipped++; wrongItems.push({idx: i, q: q, ua: null}); }
    else if (ua === q.ans) { correct++; }
    else { wrong++; wrongItems.push({idx: i, q: q, ua: ua}); }
  });
  const total = questions.length;
  const pct = Math.round((correct / total) * 100);
  let barColor = '#ef4444';
  if (pct >= 80) barColor = '#22c55e';
  else if (pct >= 60) barColor = '#f59e0b';
  let gradeMsg = '';
  if (pct >= 90) gradeMsg = '&#127881; Excellent! Outstanding performance!';
  else if (pct >= 80) gradeMsg = '&#128077; Great job! Well done!';
  else if (pct >= 60) gradeMsg = '&#128218; Good effort! Keep reviewing the weak areas.';
  else gradeMsg = '&#128270; Keep studying! Focus on the topics below.';

  let needsWorkHTML = '';
  if (wrongItems.length === 0) {
    needsWorkHTML = '<div class="all-correct-msg">&#127881; Perfect score! You answered every question correctly!</div>';
  } else {
    needsWorkHTML = '<div class="needs-work"><h3>&#128270; Areas to Review (' + wrongItems.length + ' questions)</h3>';
    wrongItems.forEach(function(item) {
      const yourAns = item.ua !== null
        ? String.fromCharCode(65 + item.ua) + '. ' + item.q.opts[item.ua]
        : 'Not answered (skipped)';
      const correctAns = String.fromCharCode(65 + item.q.ans) + '. ' + item.q.opts[item.q.ans];
      needsWorkHTML += '<div class="needs-work-item">'
        + '<div class="nw-q">Q' + (item.idx + 1) + ': ' + item.q.q + '</div>'
        + '<div class="nw-your">&#10008; Your answer: ' + yourAns + '</div>'
        + '<div class="nw-ans">&#10004; Correct answer: ' + correctAns + '</div>'
        + '<div class="nw-exp">&#128161; ' + item.q.exp + '</div>'
        + '</div>';
    });
    needsWorkHTML += '</div>';
  }

  const recap = document.getElementById('recap');
  recap.style.display = 'block';
  recap.innerHTML = '<h2>&#128202; Quiz Results</h2>'
    + '<div class="score-grid">'
    + '<div class="score-box total"><div class="num">' + total + '</div><div class="lbl">Total Questions</div></div>'
    + '<div class="score-box correct-box"><div class="num">' + correct + '</div><div class="lbl">Correct &#10004;</div></div>'
    + '<div class="score-box wrong-box"><div class="num">' + wrong + '</div><div class="lbl">Wrong &#10008;</div></div>'
    + '<div class="score-box skip-box"><div class="num">' + skipped + '</div><div class="lbl">Skipped &#9888;</div></div>'
    + '<div class="score-box pct-box"><div class="num">' + pct + '%</div><div class="lbl">Score</div></div>'
    + '</div>'
    + '<div class="grade-bar-wrap">'
    + '<div class="grade-bar-bg"><div class="grade-bar-fill" id="grade-bar" style="width:0%;background:' + barColor + '"></div></div>'
    + '<div class="grade-label">' + gradeMsg + '</div>'
    + '</div>'
    + needsWorkHTML
    + '<button id="restart-btn" onclick="restartQuiz()">&#8635; Restart Quiz</button>';

  setTimeout(function() {
    const bar = document.getElementById('grade-bar');
    if (bar) bar.style.width = pct + '%';
  }, 100);
}

function restartQuiz() {
  userAnswers = new Array(questions.length).fill(null);
  document.getElementById('recap').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'inline-block';
  buildQuiz();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
updateProgress();
</script>
