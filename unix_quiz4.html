    tag: "shortcut", tagLabel: "Shortcuts",
    q: "What does <code>cd -</code> do?",
    options: ["Goes to the root directory", "Goes up one directory", "Goes to the previously visited directory", "Goes to the home directory"],
    answer: 2,
    exp: ["❌ Wrong. <code>cd /</code> goes to the root directory.", "❌ Wrong. <code>cd ..</code> goes up one level.", "✅ Correct! <code>cd -</code> switches you back to the <strong>previously visited directory</strong> — very useful for toggling between two locations.", "❌ Wrong. <code>cd ~</code> goes to the home directory."]
  },
  {
    tag: "shortcut", tagLabel: "Shortcuts",
    q: "What does <code>!!</code> do in the terminal?",
    options: ["Exits the terminal", "Repeats the last command", "Shows command history", "Clears the screen"],
    answer: 1,
    exp: ["❌ Wrong. Use <code>exit</code> or <code>Ctrl+D</code> to exit.", "✅ Correct! <code>!!</code> re-executes the <strong>last command</strong> you ran. Very useful with <code>sudo !!</code>.", "❌ Wrong. <code>history</code> shows the command history.", "❌ Wrong. <code>clear</code> or <code>Ctrl+L</code> clears the screen."]
  },
  {
    tag: "pattern", tagLabel: "Pattern Matching",
    q: "What does the wildcard <code>*</code> match in shell pattern matching?",
    options: ["Exactly one character", "Any single digit", "Any number of characters (including none)", "Only letters"],
    answer: 2,
    exp: ["❌ Wrong. <code>?</code> matches exactly one character.", "❌ Wrong. <code>*</code> matches any characters, not just digits.", "✅ Correct! <code>*</code> matches <strong>any number of characters</strong>, including zero characters. Example: <code>ls *.txt</code> lists all .txt files.", "❌ Wrong. <code>*</code> matches any character type."]
  },
  {
    tag: "pattern", tagLabel: "Pattern Matching",
    q: "What does <code>ls ?.sh</code> match?",
    options: ["All .sh files", "Any .sh file with exactly one character before the dot", ".sh files starting with a question mark", "Files with unknown extensions"],
    answer: 1,
    exp: ["❌ Wrong. <code>ls *.sh</code> would match all .sh files.", "✅ Correct! <code>?</code> matches <strong>exactly one character</strong>. So <code>?.sh</code> matches files like <code>a.sh</code>, <code>b.sh</code>, but NOT <code>ab.sh</code>.", "❌ Wrong. <code>?</code> is a wildcard, not a literal character.", "❌ Wrong. <code>?</code> is a one-character wildcard."]
  },
  {
    tag: "pattern", tagLabel: "Pattern Matching",
    q: "What does the pattern <code>[a-p]</code> match?",
    options: ["The literal string 'a-p'", "Any single character in the range from a to p", "All characters from a to z", "Any two-character sequence"],
    answer: 1,
    exp: ["❌ Wrong. Square brackets define a character class, not a literal string.", "✅ Correct! <code>[a-p]</code> matches <strong>any single character</strong> in the range from 'a' to 'p' (inclusive).", "❌ Wrong. <code>[a-z]</code> would match a to z.", "❌ Wrong. Character classes match a single character, not two."]
  },
  {
    tag: "pattern", tagLabel: "Pattern Matching",
    q: "Which command lists files named <code>file1.txt</code>, <code>file2.txt</code>, and <code>file3.txt</code>?",
    options: ["<code>ls file*.txt</code>", "<code>ls file?.txt</code>", "<code>ls file[1-3].txt</code>", "Both B and C"],
    answer: 3,
    exp: ["❌ Wrong. <code>file*.txt</code> would also match <code>file123.txt</code>, <code>fileabc.txt</code>, etc.", "❌ Partially correct but not alone — <code>file?.txt</code> matches any single character, so it works, but so does C.", "❌ Partially correct but not alone — <code>file[1-3].txt</code> specifically matches 1, 2, or 3.", "✅ Correct! Both <code>ls file?.txt</code> (any single char) and <code>ls file[1-3].txt</code> (specifically 1, 2, or 3) would match those three files."]
  }
];

let userAnswers = new Array(questions.length).fill(null);
let answered = 0;

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const tagClass = q.tag === 'cli' ? 'tag-cli' : q.tag === 'cmd' ? 'tag-cmd' : q.tag === 'pattern' ? 'tag-pattern' : 'tag-shortcut';
    let optionsHTML = q.options.map((opt, j) => {
      const labels = ['A', 'B', 'C', 'D'];
      return `<button class="option-btn" id="opt-${i}-${j}" onclick="selectAnswer(${i}, ${j})">
        <span class="opt-label">${labels[j]}.</span>
        <span>${opt}</span>
      </button>`;
    }).join('');
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="question-number">
        <span class="tag ${tagClass}">${q.tagLabel}</span>
        &nbsp; Question ${i + 1} / ${questions.length}
      </div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="options-${i}">${optionsHTML}</div>
      <div class="explanation" id="exp-${i}"></div>
    `;
    container.appendChild(card);
  });
}

function selectAnswer(qIndex, optIndex) {
  if (userAnswers[qIndex] !== null) return;
  userAnswers[qIndex] = optIndex;
  answered++;
  updateProgress();

  const q = questions[qIndex];
  const labels = ['A', 'B', 'C', 'D'];
  for (let j = 0; j < q.options.length; j++) {
    const btn = document.getElementById(`opt-${qIndex}-${j}`);
    btn.disabled = true;
    if (j === q.answer) {
      btn.classList.add('correct');
    } else if (j === optIndex && optIndex !== q.answer) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dimmed');
    }
  }

  const expDiv = document.getElementById(`exp-${qIndex}`);
  expDiv.innerHTML = q.exp[optIndex];
  expDiv.className = 'explanation ' + (optIndex === q.answer ? 'correct-exp' : 'wrong-exp');
  expDiv.style.display = 'block';

  document.getElementById(`card-${qIndex}`).classList.add('answered');
}

function updateProgress() {
  const pct = (answered / questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answered} / ${questions.length} answered`;
}

function submitQuiz() {
  const correct = userAnswers.filter((a, i) => a === questions[i].answer).length;
  const skipped = userAnswers.filter(a => a === null).length;
  const wrong = questions.length - correct - skipped;
  const pct = Math.round((correct / questions.length) * 100);

  document.getElementById('scoreDisplay').innerHTML = `<span>${correct}</span> / ${questions.length} <small>(${pct}%)</small>`;
  setTimeout(() => {
    document.getElementById('scoreBar').style.width = pct + '%';
  }, 100);

  const recapList = document.getElementById('recapList');
  recapList.innerHTML = '';
  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const isCorrect = ua === q.answer;
    const isSkipped = ua === null;
    const labels = ['A', 'B', 'C', 'D'];
    let cls, icon, detail;
    if (isSkipped) {
      cls = 'r-skipped'; icon = '⏭️';
      detail = `<div class="r-detail">Not answered</div><div class="r-correct-ans">✅ Correct answer: ${labels[q.answer]}. ${q.options[q.answer]}</div>`;
    } else if (isCorrect) {
      cls = 'r-correct'; icon = '✅';
      detail = `<div class="r-detail">Your answer: ${labels[ua]}. ${q.options[ua]}</div>`;
    } else {
      cls = 'r-wrong'; icon = '❌';
      detail = `<div class="r-detail">Your answer: ${labels[ua]}. ${q.options[ua]}</div><div class="r-correct-ans">✅ Correct: ${labels[q.answer]}. ${q.options[q.answer]}</div>`;
    }
    const li = document.createElement('li');
    li.className = `recap-item ${cls}`;
    li.innerHTML = `<span class="recap-icon">${icon}</span><div><strong>Q${i+1}: ${q.q}</strong>${detail}</div>`;
    recapList.appendChild(li);
  });

  document.getElementById('recap').style.display = 'block';
  document.getElementById('recap').scrollIntoView({ behavior: 'smooth' });
}

function retryQuiz() {
  userAnswers = new Array(questions.length).fill(null);
  answered = 0;
  updateProgress();
  buildQuiz();
  document.getElementById('recap').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
