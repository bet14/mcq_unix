let userAnswers = new Array(questions.length).fill(null);

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'card-' + i;
    let optionsHTML = q.options.map((opt, j) =>
      `<button class="option-btn" id="opt-${i}-${j}" onclick="selectAnswer(${i}, ${j})">${String.fromCharCode(65+j)}. ${opt}</button>
       <div class="explanation" id="exp-${i}-${j}">${q.explanations[j]}</div>`
    ).join('');
    card.innerHTML = `
      <div class="tag">${q.tag}</div>
      <div class="question-number">Question ${i+1} / ${questions.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${optionsHTML}</div>
    `;
    container.appendChild(card);
  });
  updateProgress();
}

function selectAnswer(qIndex, optIndex) {
  if (userAnswers[qIndex] !== null) return;
  userAnswers[qIndex] = optIndex;
  const q = questions[qIndex];
  for (let j = 0; j < q.options.length; j++) {
    const btn = document.getElementById(`opt-${qIndex}-${j}`);
    const exp = document.getElementById(`exp-${qIndex}-${j}`);
    btn.disabled = true;
    exp.classList.add('show');
    if (j === q.answer) {
      btn.classList.add('correct');
      exp.classList.add('correct-exp');
    } else if (j === optIndex) {
      btn.classList.add('wrong');
      exp.classList.add('wrong-exp');
    } else {
      exp.classList.add('correct-exp');
      btn.style.opacity = '0.5';
    }
  }
  updateProgress();
}

function updateProgress() {
  const answered = userAnswers.filter(a => a !== null).length;
  const pct = (answered / questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = answered + ' / ' + questions.length + ' answered';
}

function submitQuiz() {
  let correct = 0, wrong = 0, skip = 0;
  const recapList = document.getElementById('recapList');
  recapList.innerHTML = '';
  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    let cls, icon, detail;
    if (ua === null) {
      skip++;
      cls = 'r-skip'; icon = '⏭️';
      detail = `<em>Skipped</em> — Correct answer: <strong>${String.fromCharCode(65+q.answer)}. ${q.options[q.answer]}</strong>`;
    } else if (ua === q.answer) {
      correct++;
      cls = 'r-correct'; icon = '✅';
      detail = `Your answer: <strong>${String.fromCharCode(65+ua)}. ${q.options[ua]}</strong>`;
    } else {
      wrong++;
      cls = 'r-wrong'; icon = '❌';
      detail = `Your answer: <strong>${String.fromCharCode(65+ua)}. ${q.options[ua]}</strong> — Correct: <strong>${String.fromCharCode(65+q.answer)}. ${q.options[q.answer]}</strong>`;
    }
    const li = document.createElement('li');
    li.className = 'recap-item ' + cls;
    li.innerHTML = `<strong>${icon} Q${i+1} [${q.tag}]: ${q.q.replace(/<[^>]+>/g,'')}</strong>${detail}`;
    recapList.appendChild(li);
  });
  document.getElementById('scoreCorrect').textContent = correct;
  document.getElementById('scoreWrong').textContent = wrong;
  document.getElementById('scoreSkip').textContent = skip;
  const recap = document.getElementById('recap');
  recap.style.display = 'block';
  recap.scrollIntoView({ behavior: 'smooth' });
}

function retryQuiz() {
  userAnswers = new Array(questions.length).fill(null);
  document.getElementById('recap').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
